    .slide::after{content:'';position:absolute;inset:0;background:
      linear-gradient(to bottom,

        rgba(5,4,3,.05) 22%,

    .nav-links{display:flex;gap:1.6rem;list-style:none;}

    .nav-links a:hover{color:var(--text);}

    /* BOTTOM */
    .bottom{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:0 2.5rem 2rem;}
    .quote-wrap{max-width:680px;margin-bottom:1.4rem;opacity:0;transform:translateY(10px);transition:opacity 1s ease .5s,transform 1s ease .5s;}

    .apod-tag{font-family:var(--mono);font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);background:rgba(217,140,48,.1);border:1px solid var(--amber-dim);padding:.18rem .55rem;margin-bottom:.55rem;display:none;align-items:center;gap:.35rem;}

    .quote-text{font-family:var(--serif);font-weight:200;font-style:italic;font-size:clamp(1.2rem,2.6vw,1.72rem);line-height:1.45;color:var(--text);letter-spacing:-.01em;margin-bottom:.5rem;text-shadow:0 1px 8px rgba(0,0,0,.6);}

    .bottom-bar{display:flex;justify-content:space-between;align-items:flex-end;}
    .species-wrap{opacity:0;transform:translateY(5px);transition:opacity .7s ease .8s,transform .7s ease .8s;}

    .species-name{font-size:.54rem;letter-spacing:.13em;text-transform:uppercase;color:var(--amber);margin-bottom:.1rem;}
    .species-loc{font-size:.54rem;color:var(--faint);margin-bottom:.3rem;}

    .learn-btn:hover{color:var(--amber);border-color:var(--amber-dim);}
    .controls{display:flex;flex-direction:column;align-items:flex-end;gap:.65rem;}
    .counter{font-size:.5rem;letter-spacing:.1em;color:var(--faint);}

    .drawer-loc{font-family:var(--mono);font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:1.5rem;}

    .drawer-block h4{font-family:var(--mono);font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:.65rem;}
    .drawer-block p{font-family:var(--serif);font-size:.88rem;font-weight:300;color:var(--muted);line-height:1.78;}

    .drawer-facts li::before{content:'✦';position:absolute;left:0;color:var(--amber);font-size:.5rem;top:.3em;}

    /* MUSIC PLAYER — Spotify only, no YouTube */
    #mplayer{position:fixed;bottom:1.75rem;right:2.5rem;z-index:50;display:flex;flex-direction:column;align-items:flex-end;gap:.45rem;}
    .mp-toggle{background:rgba(7,6,5,.9);backdrop-filter:blur(12px);border:1px solid rgba(237,231,219,.14);color:var(--muted);font-family:var(--mono);font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;padding:.45rem .8rem;cursor:pointer;display:flex;align-items:center;gap:.45rem;transition:color .2s,border-color .2s;}
    .mp-toggle:hover{color:var(--amber-hi);border-color:var(--amber-dim);}
    .mp-dot{width:5px;height:5px;border-radius:50%;background:var(--faint);flex-shrink:0;transition:background .3s;}
    .mp-dot.on{background:var(--amber);animation:pulse 1.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.28;}}
    .mp-panel{background:rgba(7,6,5,.96);backdrop-filter:blur(16px);border:1px solid rgba(237,231,219,.1);width:310px;display:none;overflow:hidden;}
    .mp-panel.open{display:block;}
    .mp-tabs{display:flex;border-bottom:1px solid rgba(237,231,219,.08);}
    .mpt{flex:1;font-family:var(--mono);font-size:.47rem;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);padding:.5rem .2rem;cursor:pointer;text-align:center;border-bottom:1.5px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;white-space:nowrap;}
    .mpt:hover{color:var(--muted);}
    .mpt.active{color:var(--amber);border-bottom-color:var(--amber);}
    .mp-pane{display:none;}
    .mp-pane.active{display:block;}
    .mp-pane iframe{display:block;}

    .mp-search{padding:.6rem .7rem;border-bottom:1px solid rgba(237,231,219,.07);display:flex;gap:.4rem;}
    .mp-search input{flex:1;background:rgba(237,231,219,.06);border:1px solid rgba(237,231,219,.12);color:var(--text);font-family:var(--mono);font-size:.58rem;padding:.35rem .55rem;outline:none;min-width:0;transition:border-color .2s;}
    .mp-search input:focus{border-color:var(--amber-dim);}
    .mp-search input::placeholder{color:var(--faint);}
    .mp-search button{background:none;border:1px solid rgba(237,231,219,.14);color:var(--muted);font-family:var(--mono);font-size:.52rem;letter-spacing:.06em;text-transform:uppercase;padding:.35rem .6rem;cursor:pointer;white-space:nowrap;transition:color .2s,border-color .2s;flex-shrink:0;}
    .mp-search button:hover{color:var(--amber);border-color:var(--amber-dim);}
    .mp-note{padding:.5rem .7rem;font-size:.5rem;color:var(--faint);font-family:var(--mono);line-height:1.55;border-top:1px solid rgba(237,231,219,.06);}

  </style>

/* ═══════════════════════════════════════════════════════
   SLIDESHOW ENGINE
═══════════════════════════════════════════════════════ */
let slides = [...STATIC_SLIDES];
const slidesEl = document.getElementById('slides');

function buildSlides() {
  slidesEl.innerHTML = '';
  slides.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'slide' + (i === 0 ? ' active' : '');
    el.style.backgroundImage = `url('${s.img}')`;
    slidesEl.appendChild(el);
  });
}
buildSlides();

const MIN_DUR = 10 * 60 * 1000; // 10 min
const MAX_DUR = 20 * 60 * 1000; // 20 min
const TICK = 2000;
let cur = 0, timer = null, elapsed = 0, curDur = rndDur(), paused = false;

function rndDur() { return MIN_DUR + Math.random() * (MAX_DUR - MIN_DUR); }

function showSlide(n) {
  const els = document.querySelectorAll('.slide');
  if (!els.length) return;
  els[cur].classList.remove('active');
  document.getElementById('qWrap').classList.remove('visible');
  document.getElementById('spWrap').classList.remove('visible');
  closeDrawer();
  cur = (n + slides.length) % slides.length;
  curDur = rndDur(); elapsed = 0;
  document.getElementById('fill').style.width = '0%';
  els[cur].classList.add('active');
  const s = slides[cur];
  const q = QUOTES[(cur + Math.floor(Date.now() / 3600000)) % QUOTES.length];
  document.getElementById('qText').textContent = s.isAPOD ? s.title : q.t;
  document.getElementById('qAttr').textContent = s.isAPOD ? '— NASA APOD · ' + s.date : '— ' + q.a;
  document.getElementById('apodTag').className = 'apod-tag' + (s.isAPOD ? ' show' : '');
  document.getElementById('spName').textContent = s.name || '';
  document.getElementById('spLoc').textContent  = s.loc  || '';
  const lb = document.getElementById('learnBtn');
  lb.className = 'learn-btn' + (s.info ? ' show' : '');
  document.getElementById('counter').textContent =
    String(cur + 1).padStart(2, '0') + ' / ' + String(slides.length).padStart(2, '0');
  setTimeout(() => {
    document.getElementById('qWrap').classList.add('visible');
    document.getElementById('spWrap').classList.add('visible');
  }, 450);
}

function tick() {
  if (paused) return;
  elapsed += TICK;
  document.getElementById('fill').style.width = Math.min((elapsed / curDur) * 100, 100) + '%';
  if (elapsed >= curDur) showSlide(cur + 1);
}

function startTimer() { clearInterval(timer); timer = setInterval(tick, TICK); }

document.getElementById('next').onclick = () => { showSlide(cur + 1); startTimer(); };
document.getElementById('prev').onclick = () => { showSlide(cur - 1); startTimer(); };
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { showSlide(cur + 1); startTimer(); }
  if (e.key === 'ArrowLeft')  { showSlide(cur - 1); startTimer(); }
});
document.querySelector('.bottom').addEventListener('mouseenter', () => { paused = true; });
document.querySelector('.bottom').addEventListener('mouseleave', () => { paused = false; });

showSlide(0);
startTimer();

/* ═══════════════════════════════════════════════════════
   LOAD WILDLIFE IMAGES FROM UNSPLASH API
   Adds to slides after initial render — non-blocking
═══════════════════════════════════════════════════════ */
async function loadWildlife() {
  if (!UNSPLASH_KEY || UNSPLASH_KEY === 'sgPN2TYKB9CNWvySWEmb7Rx9fnnxSEyUiW_vMPi6baM') return;
  try {
    const queries = ['african wildlife', 'africa', 'kenya', 'humanity', 'marine life ocean', 'tropical birds', 'african savanna', 'plantation landscapes', 'rainforest wildlife', 'vintage plane', 'coral reef fish'];
    const results = await Promise.allSettled(queries.map(q =>
      fetch(`https://api.unsplash.com/photos/random?query=${encodeURIComponent(q)}&count=8&orientation=landscape&client_id=${UNSPLASH_KEY}`)
        .then(r => r.ok ? r.json() : [])
    ));
    const newSlides = [];
    results.forEach(r => {
      if (r.status === 'fulfilled' && Array.isArray(r.value)) {
        r.value.forEach(p => {
          newSlides.push({
            img: p.urls.regular,
            name: p.alt_description ? p.alt_description.replace(/^\w/, c => c.toUpperCase()) : '',
            loc: [p.location?.city, p.location?.country].filter(Boolean).join(', '),
            info: null,
            credit: p.user.name
          });
        });
      }
    });
    if (newSlides.length) {
      // Shuffle wildlife images in
      newSlides.sort(() => Math.random() - 0.5);
      slides = [...STATIC_SLIDES, ...newSlides];
      buildSlides();
      // Re-show current slide to keep in sync
      document.getElementById('counter').textContent =
        String(cur + 1).padStart(2, '0') + ' / ' + String(slides.length).padStart(2, '0');
    }
  } catch(e) { /* fail silently */ }
}

/* ═══════════════════════════════════════════════════════
   NASA APOD — async, non-blocking
═══════════════════════════════════════════════════════ */
async function loadAPOD() {
  try {
    const r = await fetch(`https://api.nasa.gov/planetary/apod?api_key=${NASA_KEY}`);
    if (!r.ok) return;
    const d = await r.json();
    if (d.media_type === 'image') {
      slides.unshift({ img: d.hdurl || d.url, isAPOD: true, title: d.title, date: d.date, name: d.copyright ? '© ' + d.copyright : 'NASA', loc: 'Astronomy Picture of the Day', info: null });
      buildSlides();
      document.getElementById('counter').textContent =
        String(cur + 1).padStart(2, '0') + ' / ' + String(slides.length).padStart(2, '0');
    }
  } catch(e) { /* fail silently */ }
}

// Load API data after 3 seconds — page is usable immediately
setTimeout(() => { loadWildlife(); loadAPOD(); }, 3000);

/* ═══════════════════════════════════════════════════════
   INFO DRAWER
═══════════════════════════════════════════════════════ */
function openDrawer() {
  const s = slides[cur];
  if (!s || !s.info) return;
  document.getElementById('dTitle').textContent = s.name;
  document.getElementById('dLoc').textContent   = s.loc;
  document.getElementById('dGrid').innerHTML = `
    <div class="drawer-block">
      <h4>Classification</h4>
      <p class="drawer-class">${s.info.classification.split('·').map(p => '<span>' + p.trim() + '</span>').join('<br>')}</p>
    </div>
    <div class="drawer-block">
      <h4>Description</h4>
      <p>${s.info.description}</p>
    </div>
    <div class="drawer-block">
      <h4>Habitat &amp; Range</h4>
      <p>${s.info.habitat}</p>
    </div>
    <div class="drawer-block">
      <h4>Five things worth knowing</h4>
      <ul class="drawer-facts">${s.info.facts.map(f => '<li>' + f + '</li>').join('')}</ul>
    </div>`;
  document.getElementById('drawer').classList.add('open');
  paused = true;
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  paused = false;
}

/* MUSIC PLAYER */
function toggleMp() {
  const p = document.getElementById('mpPanel'), d = document.getElementById('mpDot');
  p.classList.toggle('open');
  d.classList.toggle('on', p.classList.contains('open'));
}
function swMp(el, id) {
  document.querySelectorAll('.mpt').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.mp-pane').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('mp-' + id).classList.add('active');
}
function doSearch() {
  const q = document.getElementById('spSearch').value.trim();
  if (q) window.open('https://open.spotify.com/search/' + encodeURIComponent(q), '_blank');
}
